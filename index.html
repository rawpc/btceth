<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="icon-192.png">
<title>BTCETH 6M</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:space-around;
}

.card{
    width:45%;
    text-align:center;
}

.symbol{
    font-size:28px;
    opacity:0.6;
}

.price{
    font-size:60px;
    font-weight:300;
}

canvas{
    margin-top:20px;
    width:100%;
    height:220px;
}
</style>
</head>

<body>

<div class="card">
    <div class="symbol">BTC</div>
    <div class="price" id="btcPrice">--</div>
    <canvas id="btcChart"></canvas>
</div>

<div class="card">
    <div class="symbol">ETH</div>
    <div class="price" id="ethPrice">--</div>
    <canvas id="ethChart"></canvas>
</div>

<script>

var btcHistory = [];
var ethHistory = [];

function getJSON(url, callback){
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4 && xhr.status === 200){
            try{
                var data = JSON.parse(xhr.responseText);
                callback(data);
            }catch(e){}
        }
    };
    xhr.open("GET", url, true);
    xhr.send();
}

function drawLine(canvas, data){

    var ctx = canvas.getContext("2d");
    var w = canvas.width = canvas.offsetWidth;
    var h = canvas.height = 220;

    ctx.clearRect(0,0,w,h);

    if(data.length < 2) return;

    var min = data[0];
    var max = data[0];

    for(var i=1;i<data.length;i++){
        if(data[i] < min) min = data[i];
        if(data[i] > max) max = data[i];
    }

    var range = max - min;
    if(range === 0) range = 1;

    // Kolor zależny od trendu 6 miesięcy
    var first = data[0];
    var last = data[data.length - 1];

    if(last >= first){
        ctx.strokeStyle = "#00ff88";
    } else {
        ctx.strokeStyle = "#ff3b3b";
    }

    ctx.lineWidth = 2;
    ctx.beginPath();

    var points = [];

    for(var i=0;i<data.length;i++){
        var x = i * (w / (data.length - 1));
        var y = h - ((data[i] - min) / range) * h;
        points.push({x:x, y:y});
    }

    ctx.moveTo(points[0].x, points[0].y);

    for(var i=1;i<points.length-1;i++){
        var midX = (points[i].x + points[i+1].x) / 2;
        var midY = (points[i].y + points[i+1].y) / 2;

        ctx.quadraticCurveTo(
            points[i].x,
            points[i].y,
            midX,
            midY
        );
    }

    ctx.lineTo(
        points[points.length-1].x,
        points[points.length-1].y
    );

    ctx.stroke();
}

function loadHistorical(){

    var btcUrl = "https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=180";
    var ethUrl = "https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=180";

    getJSON(btcUrl, function(data){
        if(data && data.prices){

            btcHistory = [];

            for(var i=0;i<data.prices.length;i++){
                btcHistory.push(data.prices[i][1]);
            }

            var lastPrice = btcHistory[btcHistory.length-1];

            document.getElementById("btcPrice").innerHTML =
                "$" + lastPrice.toFixed(2);

            drawLine(document.getElementById("btcChart"), btcHistory);
        }
    });

    getJSON(ethUrl, function(data){
        if(data && data.prices){

            ethHistory = [];

            for(var i=0;i<data.prices.length;i++){
                ethHistory.push(data.prices[i][1]);
            }

            var lastPrice = ethHistory[ethHistory.length-1];

            document.getElementById("ethPrice").innerHTML =
                "$" + lastPrice.toFixed(2);

            drawLine(document.getElementById("ethChart"), ethHistory);
        }
    });
}

window.onload = function(){
    loadHistorical();
};

</script>

</body>
</html>
