<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCETH</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:space-around;
}

.card{
    width:45%;
    text-align:center;
}

.symbol{
    font-size:28px;
    opacity:0.6;
}

.price{
    font-size:80px;
    font-weight:300;
    transition:0.3s ease;
    text-shadow:0 0 20px rgba(255,255,255,0.2);
}

.up{
    color:#00ff88;
    text-shadow:0 0 25px rgba(0,255,136,0.6);
}

.down{
    color:#ff3b3b;
    text-shadow:0 0 25px rgba(255,59,59,0.6);
}

canvas{
    margin-top:30px;
    width:100%;
    height:200px;
}
</style>
</head>

<body>

<div class="card">
    <div class="symbol">BTC</div>
    <div class="price" id="btcPrice">--</div>
    <canvas id="btcChart"></canvas>
</div>

<div class="card">
    <div class="symbol">ETH</div>
    <div class="price" id="ethPrice">--</div>
    <canvas id="ethChart"></canvas>
</div>

<script>
let prevBTC=null;
let prevETH=null;

let btcHistory=[];
let ethHistory=[];
const maxPoints=60;

async function fetchSpot(symbol){
    const res=await fetch("https://api.coinbase.com/v2/prices/"+symbol+"-USD/spot");
    const data=await res.json();
    return parseFloat(data.data.amount);
}

function updateColor(el,current,previous){
    if(previous===null)return;
    el.classList.remove("up","down");
    if(current>previous)el.classList.add("up");
    if(current<previous)el.classList.add("down");
}

function drawChart(canvas,data,color){
    const ctx=canvas.getContext("2d");
    const w=canvas.width=canvas.offsetWidth;
    const h=canvas.height=200;

    ctx.clearRect(0,0,w,h);

    if(data.length<2)return;

    const min=Math.min.apply(null,data);
    const max=Math.max.apply(null,data);
    const range=max-min || 1;

    ctx.beginPath();
    ctx.lineWidth=2;
    ctx.strokeStyle=color;

    for(let i=0;i<data.length;i++){
        const x=i*(w/(maxPoints-1));
        const y=h-((data[i]-min)/range)*h;

        if(i===0){
            ctx.moveTo(x,y);
        }else{
            ctx.lineTo(x,y);
        }
    }

    ctx.stroke();
}

async function update(){
    try{
        const btc=await fetchSpot("BTC");
        const eth=await fetchSpot("ETH");

        const btcEl=document.getElementById("btcPrice");
        const ethEl=document.getElementById("ethPrice");

        btcEl.innerText="$"+btc.toFixed(2);
        ethEl.innerText="$"+eth.toFixed(2);

        updateColor(btcEl,btc,prevBTC);
        updateColor(ethEl,eth,prevETH);

        prevBTC=btc;
        prevETH=eth;

        btcHistory.push(btc);
        ethHistory.push(eth);

        if(btcHistory.length>maxPoints)btcHistory.shift();
        if(ethHistory.length>maxPoints)ethHistory.shift();

        drawChart(document.getElementById("btcChart"),btcHistory,"#00ff88");
        drawChart(document.getElementById("ethChart"),ethHistory,"#ff3b3b");

    }catch(e){
        console.log("error",e);
    }
}

document.addEventListener("DOMContentLoaded",function(){
    update();
    setInterval(update,10000);
});
</script>

</body>
</html>
