<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCETH</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:space-around;
}
.card{
    width:45%;
    text-align:center;
}
.symbol{
    font-size:28px;
    opacity:0.6;
}
.price{
    font-size:60px;
    font-weight:300;
}
.chart{
    margin-top:20px;
    height:120px;
    display:flex;
    align-items:flex-end;
}
.bar{
    flex:1;
    margin:0 1px;
    background:#00ff88;
}
</style>
</head>

<body>

<div class="card">
    <div class="symbol">BTC</div>
    <div class="price" id="btcPrice">--</div>
    <div class="chart" id="btcChart"></div>
</div>

<div class="card">
    <div class="symbol">ETH</div>
    <div class="price" id="ethPrice">--</div>
    <div class="chart" id="ethChart"></div>
</div>

<script>

var btcHistory = [];
var ethHistory = [];
var maxPoints = 40;

function getJSON(url, callback){
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4 && xhr.status === 200){
            try{
                var data = JSON.parse(xhr.responseText);
                callback(data);
            }catch(e){}
        }
    };
    xhr.open("GET", url, true);
    xhr.send();
}

function drawBars(container, data){
    container.innerHTML = "";

    if(data.length < 2) return;

    var min = data[0];
    var max = data[0];

    for(var i=1;i<data.length;i++){
        if(data[i] < min) min = data[i];
        if(data[i] > max) max = data[i];
    }

    var range = max - min;
    if(range === 0) range = 1;

    for(var i=0;i<data.length;i++){
        var bar = document.createElement("div");
        bar.className = "bar";

        var height = ((data[i] - min) / range) * 100;
        bar.style.height = height + "%";

        container.appendChild(bar);
    }
}

function update(){
    getJSON("https://api.coinbase.com/v2/prices/BTC-USD/spot", function(data){
        if(data && data.data){
            var btc = parseFloat(data.data.amount);
            document.getElementById("btcPrice").innerHTML =
                "$" + btc.toFixed(2);

            btcHistory.push(btc);
            if(btcHistory.length > maxPoints){
                btcHistory.shift();
            }

            drawBars(document.getElementById("btcChart"), btcHistory);
        }
    });

    getJSON("https://api.coinbase.com/v2/prices/ETH-USD/spot", function(data){
        if(data && data.data){

            document.getElementById("ethPrice").innerHTML =
