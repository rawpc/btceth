<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCETH</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:space-around;
}

.card{
    width:45%;
    text-align:center;
}

.symbol{
    font-size:28px;
    opacity:0.6;
}

.price{
    font-size:80px;
    font-weight:300;
}
</style>
</head>

<body>

<div class="card">
    <div class="symbol">BTC</div>
    <div class="price" id="btcPrice">--</div>
</div>

<div class="card">
    <div class="symbol">ETH</div>
    <div class="price" id="ethPrice">--</div>
</div>

<script>
let prevBTC = null;
let prevETH = null;

async function fetchSpot(symbol){
    const res = await fetch("https://api.coinbase.com/v2/prices/" + symbol + "-USD/spot");
    const data = await res.json();
    return parseFloat(data.data.amount);
}

async function update(){
    try{
        const btc = await fetchSpot("BTC");
        const eth = await fetchSpot("ETH");

        document.getElementById("btcPrice").innerText = "$" + btc.toFixed(2);
        document.getElementById("ethPrice").innerText = "$" + eth.toFixed(2);

    }catch(e){
        console.log("error", e);
    }
}

document.addEventListener("DOMContentLoaded", function(){
    update();
    setInterval(update, 10000);
});
</script>

</body>
</html>
