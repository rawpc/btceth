<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCETH Line</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:space-around;
}

.card{
    width:45%;
    text-align:center;
}

.symbol{
    font-size:28px;
    opacity:0.6;
}

.price{
    font-size:70px;
    font-weight:300;
}

canvas{
    margin-top:20px;
    width:100%;
    height:180px;
}
</style>
</head>

<body>

<div class="card">
    <div class="symbol">BTC</div>
    <div class="price" id="btcPrice">--</div>
    <canvas id="btcChart"></canvas>
</div>

<div class="card">
    <div class="symbol">ETH</div>
    <div class="price" id="ethPrice">--</div>
    <canvas id="ethChart"></canvas>
</div>

<script>

var btcHistory = [];
var ethHistory = [];
var maxPoints = 60;

function getJSON(url, callback){
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4 && xhr.status === 200){
            try{
                var data = JSON.parse(xhr.responseText);
                callback(data);
            }catch(e){}
        }
    };
    xhr.open("GET", url, true);
    xhr.send();
}

function drawLine(canvas, data){
    var ctx = canvas.getContext("2d");
    var w = canvas.width = canvas.offsetWidth;
    var h = canvas.height = 180;

    ctx.clearRect(0,0,w,h);

    if(data.length < 2) return;

    var min = data[0];
    var max = data[0];

    for(var i=1;i<data.length;i++){
        if(data[i] < min) min = data[i];
        if(data[i] > max) max = data[i];
    }

    var range = max - min;
    if(range === 0) range = 1;

    ctx.beginPath();
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#00ff88";

    for(var i=0;i<data.length;i++){
        var x = i * (w / (maxPoints - 1));
        var y = h - ((data[i] - min) / range) * h;

        if(i === 0){
            ctx.moveTo(x,y);
        }else{
            ctx.lineTo(x,y);
        }
    }

    ctx.stroke();
}

function update(){

    getJSON("https://api.coinbase.com/v2/prices/BTC-USD/spot", function(data){
        if(data && data.data){
            var btc = parseFloat(data.data.amount);
            document.getElementById("btcPrice").innerHTML =
                "$" + btc.toFixed(2);

            btcHistory.push(btc);
            if(btcHistory.length > maxPoints){
                btcHistory.shift();
            }

            drawLine(document.getElementById("btcChart"), btcHistory);
        }
    });

    getJSON("https://api.coinbase.com/v2/prices/ETH-USD/spot", function(data){
        if(data && data.data){
            var eth = parseFloat(data.data.amount);
            document.getElementById("ethPrice").innerHTML =
                "$" + eth.toFixed(2);

            ethHistory.push(eth);
            if(ethHistory.length > maxPoints){
                ethHistory.shift();
            }

            drawLine(document.getElementById("ethChart"), ethHistory);
        }
    });
}

window.onload = function(){
    update();
    setInterval(update, 10000);
};

</script>

</body>
</html>
