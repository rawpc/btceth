<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCETH Legacy</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:space-around;
}

.card{
    width:45%;
    text-align:center;
}

.symbol{
    font-size:28px;
    opacity:0.6;
}

.price{
    font-size:60px;
    font-weight:300;
}
</style>
</head>

<body>

<div class="card">
    <div class="symbol">BTC</div>
    <div class="price" id="btcPrice">--</div>
</div>

<div class="card">
    <div class="symbol">ETH</div>
    <div class="price" id="ethPrice">--</div>
</div>

<script>
function getJSON(url, success){
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4){
            if(xhr.status === 200){
                try{
                    var data = JSON.parse(xhr.responseText);
                    success(data);
                }catch(e){}
            }
        }
    };
    xhr.open("GET", url, true);
    xhr.send();
}

function update(){
    getJSON("https://api.coinbase.com/v2/prices/BTC-USD/spot", function(data){
        if(data && data.data){
            document.getElementById("btcPrice").innerHTML =
                "$" + parseFloat(data.data.amount).toFixed(2);
        }
    });

    getJSON("https://api.coinbase.com/v2/prices/ETH-USD/spot", function(data){
        if(data && data.data){
            document.getElementById("ethPrice").innerHTML =
                "$" + parseFloat(data.data.amount).toFixed(2);
        }
    });
}

window.onload = function(){
    update();
    setInterval(update,10000);
};
</script>

</body>
</html>
