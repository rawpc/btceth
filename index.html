<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCETH</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="BTCETH">
<meta name="theme-color" content="#000000">

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:space-around;
}

.card{
    width:40%;
    text-align:center;
}

.symbol{
    font-size:28px;
    opacity:0.6;
}

.price{
    font-size:70px;
    font-weight:300;
}

canvas{
    margin-top:20px;
}
</style>
</head>

<body>

<div class="card">
    <div class="symbol">BTC</div>
    <div class="price" id="btcPrice">--</div>
    <canvas id="btcChart" width="500" height="180"></canvas>
</div>

<div class="card">
    <div class="symbol">ETH</div>
    <div class="price" id="ethPrice">--</div>
    <canvas id="ethChart" width="500" height="180"></canvas>
</div>

<script>

var btcHistory = [];
var ethHistory = [];
var maxPoints = 60;

function fetchPrice(pair, callback){
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4){
            if(xhr.status === 200){
                try{
                    var json = JSON.parse(xhr.responseText);
                    callback(parseFloat(json.data.amount));
                }catch(e){}
            }
        }
    };
    xhr.open("GET","https://api.coinbase.com/v2/prices/"+pair+"/spot",true);
    xhr.send();
}

function drawLine(canvas, data){
    var ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,500,180);

    if(data.length < 2) return;

    var min = Math.min.apply(null,data);
    var max = Math.max.apply(null,data);
    var range = max - min;
    if(range === 0) range = 1;

    // 🔥 dynamic color
    var last = data[data.length-1];
    var prev = data[data.length-2];

    if(last > prev){
        ctx.strokeStyle = "#00ff88";
    }else{
        ctx.strokeStyle = "#ff3b3b";
    }

    ctx.lineWidth = 2;
    ctx.beginPath();

    for(var i=0;i<data.length;i++){
        var x = (i / (maxPoints-1)) * 500;
        var y = 180 - ((data[i]-min)/range)*180;

        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }

    ctx.stroke();
}

function update(){

    fetchPrice("BTC-USD",function(price){
        if(!price) return;

        document.getElementById("btcPrice").innerHTML =
            "$"+price.toFixed(2);

        btcHistory.push(price);
        if(btcHistory.length > maxPoints) btcHistory.shift();

        drawLine(document.getElementById("btcChart"),btcHistory);
    });

    fetchPrice("ETH-USD",function(price){
        if(!price) return;

        document.getElementById("ethPrice").innerHTML =
            "$"+price.toFixed(2);

        ethHistory.push(price);
        if(ethHistory.length > maxPoints) ethHistory.shift();

        drawLine(document.getElementById("ethChart"),ethHistory);
    });
}

window.onload = function(){
    update();
    setInterval(update,10000);
};

</script>

</body>
</html>
