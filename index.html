<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCETH Terminal</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:space-around;
}

.card{
    width:45%;
    text-align:center;
}

.symbol{
    font-size:26px;
    opacity:0.6;
}

.range-switch{
    margin-top:10px;
    font-size:13px;
    letter-spacing:2px;
    opacity:0.5;
}

.range-switch span{
    margin:0 6px;
    cursor:pointer;
    transition:0.2s;
}

.range-switch span:hover{
    opacity:1;
}

.range-switch .active{
    opacity:1;
    color:#00ff88;
}

.price{
    font-size:60px;
    font-weight:300;
    margin-top:15px;
}

canvas{
    margin-top:25px;
    width:100%;
    height:220px;
}
</style>
</head>

<body>

<div class="card">
    <div class="symbol">BTC</div>
    <div class="range-switch">
        <span data-days="7">1W</span>
        <span data-days="30">1M</span>
        <span data-days="90">3M</span>
        <span data-days="180" class="active">6M</span>
        <span data-days="365">1Y</span>
    </div>
    <div class="price" id="btcPrice">--</div>
    <canvas id="btcChart"></canvas>
</div>

<div class="card">
    <div class="symbol">ETH</div>
    <div class="range-switch">
        <span data-days="7">1W</span>
        <span data-days="30">1M</span>
        <span data-days="90">3M</span>
        <span data-days="180" class="active">6M</span>
        <span data-days="365">1Y</span>
    </div>
    <div class="price" id="ethPrice">--</div>
    <canvas id="ethChart"></canvas>
</div>

<script>

var currentDays = 180;
var btcHistory = [];
var ethHistory = [];

function getJSON(url, callback){
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4 && xhr.status === 200){
            try{
                callback(JSON.parse(xhr.responseText));
            }catch(e){}
        }
    };
    xhr.open("GET", url, true);
    xhr.send();
}

function drawLine(canvas, data){

    var ctx = canvas.getContext("2d");
    var w = canvas.width = canvas.offsetWidth;
    var h = canvas.height = 220;

    ctx.clearRect(0,0,w,h);

    if(data.length < 2) return;

    var min = Math.min(...data);
    var max = Math.max(...data);
    var range = max - min;
    if(range === 0) range = 1;

    var first = data[0];
    var last = data[data.length - 1];

    ctx.strokeStyle = last >= first ? "#00ff88" : "#ff3b3b";

    ctx.lineWidth = 2;
    ctx.beginPath();

    var points = [];

    for(var i=0;i<data.length;i++){
        var x = i * (w / (data.length - 1));
        var y = h - ((data[i] - min) / range) * h;
        points.push({x:x, y:y});
    }

    ctx.moveTo(points[0].x, points[0].y);

    for(var i=1;i<points.length-1;i++){
        var midX = (points[i].x + points[i+1].x) / 2;
        var midY = (points[i].y + points[i+1].y) / 2;
        ctx.quadraticCurveTo(points[i].x, points[i].y, midX, midY);
    }

    ctx.lineTo(points[points.length-1].x, points[points.length-1].y);

    ctx.stroke();
}

function loadHistorical(){

    var btcUrl = "https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=" + currentDays;
    var ethUrl = "https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=" + currentDays;

    getJSON(btcUrl, function(data){
        if(data && data.prices){

            btcHistory = data.prices.map(p => p[1]);
            var last = btcHistory[btcHistory.length-1];

            document.getElementById("btcPrice").innerHTML =
                "$" + last.toFixed(2);

            drawLine(document.getElementById("btcChart"), btcHistory);
        }
    });

    getJSON(ethUrl, function(data){
        if(data && data.prices){

            ethHistory = data.prices.map(p => p[1]);
            var last = ethHistory[ethHistory.length-1];

            document.getElementById("ethPrice").innerHTML =
                "$" + last.toFixed(2);

            drawLine(document.getElementById("ethChart"), ethHistory);
        }
    });
}

document.querySelectorAll(".range-switch span").forEach(btn => {
    btn.addEventListener("click", function(){

        currentDays = this.getAttribute("data-days");

        document.querySelectorAll(".range-switch span")
            .forEach(el => el.classList.remove("active"));

        this.classList.add("active");

        loadHistorical();
    });
});

window.onload = function(){
    loadHistorical();
};

</script>

</body>
</html>
