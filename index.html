<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCETH iOS Safe</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:space-around;
}

.card{
    width:45%;
    text-align:center;
}

.symbol{
    font-size:28px;
    opacity:0.6;
}

.price{
    font-size:80px;
    font-weight:300;
    transition:0.3s ease;
    text-shadow:0 0 20px rgba(255,255,255,0.2);
}

.up{ color:#00ff88; }
.down{ color:#ff3b3b; }
</style>
</head>

<body>

<div class="card">
    <div class="symbol">BTC</div>
    <div class="price" id="btcPrice">--</div>
</div>

<div class="card">
    <div class="symbol">ETH</div>
    <div class="price" id="ethPrice">--</div>
</div>

<script>
let prevBTC=null;
let prevETH=null;

function getJSON(url, callback){
    var xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);
    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4 && xhr.status === 200){
            callback(JSON.parse(xhr.responseText));
        }
    };
    xhr.send();
}

function updateColor(el,current,previous){
    if(previous===null)return;
    el.classList.remove("up","down");
    if(current>previous)el.classList.add("up");
    if(current<previous)el.classList.add("down");
}

function update(){
    getJSON("https://api.coinbase.com/v2/prices/BTC-USD/spot", function(data){
        var btc = parseFloat(data.data.amount);
        var el = document.getElementById("btcPrice");
        el.innerText="$"+btc.toFixed(2);
        updateColor(el,btc,prevBTC);
        prevBTC=btc;
    });

    getJSON("https://api.coinbase.com/v2/prices/ETH-USD/spot", function(data){
        var eth = parseFloat(data.data.amount);
        var el = document.getElementById("ethPrice");
        el.innerText="$"+eth.toFixed(2);
        updateColor(el,eth,prevETH);
        prevETH=eth;
    });
}

document.addEventListener("DOMContentLoaded", function(){
    update();
    setInterval(update,10000);
});
</script>

</body>
</html>
