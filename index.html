<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCETH WALL</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
    display:flex;
    height:100vh;
}

.wrapper{
    display:flex;
    width:100%;
}

.card{
    width:50%;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:40px;
}

.symbol{
    font-size:40px;
    opacity:0.4;
    letter-spacing:4px;
}

.price{
    font-size:90px;
    font-weight:300;
    margin:20px 0 30px 0;
}

.chart{
    height:160px;
    display:flex;
    align-items:flex-end;
}

.bar{
    flex:1;
    margin:0 1px;
    background:#444;
    transition:background 0.3s;
}

.upBar{
    background:#00ff88;
    box-shadow:0 0 8px #00ff88;
}

.downBar{
    background:#ff3b3b;
    box-shadow:0 0 8px #ff3b3b;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="card">
    <div class="symbol">BTC</div>
    <div class="price" id="btcPrice">--</div>
    <div class="chart" id="btcChart"></div>
</div>

<div class="card">
    <div class="symbol">ETH</div>
    <div class="price" id="ethPrice">--</div>
    <div class="chart" id="ethChart"></div>
</div>

</div>

<script>

var btcHistory = [];
var ethHistory = [];
var maxPoints = 50;

function getJSON(url, callback){
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4 && xhr.status === 200){
            try{
                var data = JSON.parse(xhr.responseText);
                callback(data);
            }catch(e){}
        }
    };
    xhr.open("GET", url, true);
    xhr.send();
}

function drawBars(container, data){
    container.innerHTML = "";

    if(data.length < 2) return;

    var min = data[0];
    var max = data[0];

    for(var i=1;i<data.length;i++){
        if(data[i] < min) min = data[i];
        if(data[i] > max) max = data[i];
    }

    var range = max - min;
    if(range === 0) range = 1;

    for(var i=0;i<data.length;i++){

        var bar = document.createElement("div");
        bar.className = "bar";

        var height = ((data[i] - min) / range) * 100;
        bar.style.height = height + "%";

        if(i > 0){
            if(data[i] > data[i-1]){
                bar.className += " upBar";
            }else if(data[i] < data[i-1]){
                bar.className += " downBar";
            }
        }

        container.appendChild(bar);
    }
}

function update(){

    getJSON("https://api.coinbase.com/v2/prices/BTC-USD/spot", function(data){
        if(data && data.data){

            var btc = parseFloat(data.data.amount);
            document.getElementById("btcPrice").innerHTML =
                "$" + btc.toFixed(2);

            btcHistory.push(btc);
            if(btcHistory.length > maxPoints){
                btcHistory.shift();
            }

            drawBars(document.getElementById("btcChart"), btcHistory);
        }
    });

    getJSON("https://api.coinbase.com/v2/prices/ETH-USD/spot", function(data){
        if(data && data.data){

            var eth = parseFloat(data.data.amount);
            document.getElementById("ethPrice").innerHTML =
                "$" + eth.toFixed(2);

            ethHistory.push(eth);
            if(ethHistory.length > maxPoints){
                ethHistory.shift();
            }

            drawBars(document.getElementById("ethChart"), ethHistory);
        }
    });
}

window.onload = function(){
    update();
    setInterval(update, 10000);
};

</script>

</body>
</html>
